<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Governance & Compliance Scorecard 2025</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div class="flex justify-end print-hidden">
            <button onclick="window.print()" class="export-btn">
                <i data-lucide="printer" style="width: 16px; height: 16px;"></i>
                Export to PDF
            </button>
        </div>

        <div class="main-card">
            <div class="header-banner">
                <div>
                    <h1 class="title">Governance & Compliance Scorecard 2025</h1>
                    <div class="subtitle-area">
                        <i data-lucide="building-2" style="width: 20px; height: 20px;"></i>
                        <span class="font-semibold" style="white-space: nowrap;">Business Unit:</span>
                        <input type="text" placeholder="ระบุชื่อหน่วยงาน..." class="bu-input" />
                    </div>
                </div>
            </div>

            <div class="summary-grid">
                <div class="stat-card stat-gov">
                    <div class="stat-title">Governance (60%)</div>
                    <div class="stat-score"><span id="gov-weighted-score">0</span> <span class="pts-label">pts</span></div>
                    <div>
                        <div class="progress-header">
                            <span>Progress</span>
                            <span id="gov-progress-text">0%</span>
                        </div>
                        <div class="progress-track">
                            <div id="gov-progress-bar" class="progress-fill fill-gov" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                
                <div class="stat-card stat-comp">
                    <div class="stat-title">Compliance (40%)</div>
                    <div class="stat-score"><span id="comp-weighted-score">0</span> <span class="pts-label">pts</span></div>
                    <div>
                        <div class="progress-header">
                            <span>Progress</span>
                            <span id="comp-progress-text">0%</span>
                        </div>
                        <div class="progress-track">
                            <div id="comp-progress-bar" class="progress-fill fill-comp" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="stat-card stat-total">
                    <i data-lucide="trophy" class="trophy-bg"></i>
                    <div class="stat-title">Final Score</div>
                    <div class="stat-score"><span id="final-score">0</span><span class="pts-label">%</span></div>
                </div>
            </div>
            
            <div class="legend">
                <span class="flex items-center gap-1 font-semibold"><span class="dot dot-gold"></span> Gold: 90-100%</span>
                <span class="flex items-center gap-1 font-semibold"><span class="dot dot-silver"></span> Silver: 75-89%</span>
                <span class="flex items-center gap-1 font-semibold"><span class="dot dot-bronze"></span> Bronze: 60-74%</span>
            </div>
        </div>

        <div id="detail-sections" class="details-grid">
            </div>

        <div class="footer-info">
            <i data-lucide="info" style="width: 16px; height: 16px;"></i> 
            Data based on the provided "Award Criteria" infographic. Adjust sliders to see real-time calculations.
        </div>
    </div>

    <script>
        // ข้อมูลหลักของเกณฑ์การประเมิน
        const CRITERIA_DATA = {
            governance: {
                title: "Governance",
                weight: 60,
                theme: "gov",
                iconId: "building-2",
                categories: [
                    {
                        id: "g1", title: "1. Board Governance (25%)", icon: "building-2",
                        items: [
                            { id: "g1_1", title: "1.1 Attendance of Governing Body", max: 5 },
                            { id: "g1_2", title: "1.2 Circulation of Meeting Agendas...", max: 5 },
                            { id: "g1_3", title: "1.3 Implementation of Resolutions", max: 10 },
                            { id: "g1_4", title: "1.4 Performance Evaluations", max: 5 },
                        ]
                    },
                    {
                        id: "g2", title: "2. Governance Implementation (25%)", icon: "target",
                        items: [
                            { id: "g2_1", title: "2.1 Completion of CG Plan", max: 15 },
                            { id: "g2_2", title: "2.2 Anti-Corruption Recommendations", max: 10 },
                        ]
                    },
                    {
                        id: "g3", title: "3. Ethical Culture (25%)", icon: "heart-handshake",
                        items: [
                            { id: "g3_1", title: "3.1 Promoting Ethical Culture", max: 10 },
                            { id: "g3_2", title: "3.2 Employees Governance Training", max: 15 },
                        ]
                    },
                    {
                        id: "g4", title: "4. Transparency & Disclosure (25%)", icon: "search",
                        items: [
                            { id: "g4_1", title: "4.1 CG Page on Company Website", max: 20 },
                            { id: "g4_2", title: "4.2 Governance Report to the Group", max: 5 },
                        ]
                    }
                ]
            },
            compliance: {
                title: "Compliance",
                weight: 40,
                theme: "comp",
                iconId: "shield-check",
                categories: [
                    {
                        id: "c1", title: "1. Maturity Level (40%)", icon: "shield-check",
                        items: [
                            { id: "c1_1", title: "1.1 Compliance Maturity Level", max: 20 },
                            { id: "c1_2", title: "1.2 Whistleblowing Maturity Level", max: 20 },
                        ]
                    },
                    {
                        id: "c2", title: "2. Activities Attendance (10%)", icon: "users",
                        items: [
                            { id: "c2_1", title: "2.1 Compliance Network Meeting", max: 5 },
                            { id: "c2_2", title: "2.2 Procedure Training", max: 5 },
                        ]
                    },
                    {
                        id: "c3", title: "3. Compliance Implementation (30%)", icon: "file-text",
                        items: [
                            { id: "c3_1", title: "3.1 Regulatory Compliance Universe", max: 10 },
                            { id: "c3_2", title: "3.2 Non-Compliance Incident Report", max: 5 },
                            { id: "c3_3", title: "3.3 CM Training", max: 10 },
                            { id: "c3_4", title: "3.4 Compliance Maturity Assessment", max: 5 },
                        ]
                    },
                    {
                        id: "c4", title: "4. Whistleblowing Implementation (20%)", icon: "megaphone",
                        items: [
                            { id: "c4_1", title: "4.1 Whistleblowing Statistics Report", max: 5 },
                            { id: "c4_2", title: "4.2 Whistleblowing Maturity Assessment", max: 5 },
                            { id: "c4_3", title: "4.3 Whistleblowing Communication", max: 10 },
                        ]
                    }
                ]
            }
        };

        // สถานะคะแนนเริ่มต้น
        let scores = {
            g1_1: 4, g1_2: 3, g1_3: 8, g1_4: 5,
            g2_1: 10, g2_2: 8,
            g3_1: 8, g3_2: 12,
            g4_1: 15, g4_2: 4,
            c1_1: 15, c1_2: 15,
            c2_1: 4, c2_2: 4,
            c3_1: 8, c3_2: 4, c3_3: 8, c3_4: 4,
            c4_1: 4, c4_2: 4, c4_3: 8
        };

        // ฟังก์ชันสร้าง UI ของฝั่งซ้าย (Governance) และขวา (Compliance)
        function generateSectionHTML(sectionData) {
            let html = `
                <div class="section-card section-${sectionData.theme}">
                    <div class="section-header">
                        <h2 class="section-title">
                            <i data-lucide="${sectionData.iconId}"></i>
                            ${sectionData.title} (${sectionData.weight}%)
                        </h2>
                        <div class="text-right">
                            <div class="section-raw-score">
                                <span id="${sectionData.title.toLowerCase()}-raw-score">0</span><span class="raw-percent">%</span>
                            </div>
                            <div class="raw-label">Raw Score</div>
                        </div>
                    </div>
                    <div class="categories">
            `;

            sectionData.categories.forEach(category => {
                html += `
                    <div class="category-card">
                        <h3 class="category-title">
                            <i data-lucide="${category.icon}" style="width: 16px; height: 16px;"></i>
                            ${category.title}
                        </h3>
                        <div class="item-list">
                `;

                category.items.forEach(item => {
                    html += `
                        <div class="item-row">
                            <div class="item-name">${item.title}</div>
                            <div>
                                <input 
                                    type="range" 
                                    min="0" 
                                    max="${item.max}" 
                                    step="1"
                                    value="${scores[item.id] || 0}"
                                    oninput="handleScoreChange('${item.id}', this.value)"
                                    class="slider-${sectionData.theme}"
                                />
                            </div>
                            <div class="text-right">
                                <span class="item-score-box">
                                    <span id="val-${item.id}">${scores[item.id] || 0}</span> / ${item.max}
                                </span>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            html += `</div></div>`;
            return html;
        }

        // ฟังก์ชันคำนวณและอัปเดตหน้าจอทั้งหมด
        function calculateAndUpdate() {
            let govTotal = 0;
            CRITERIA_DATA.governance.categories.forEach(cat => {
                cat.items.forEach(item => govTotal += scores[item.id] || 0);
            });

            let compTotal = 0;
            CRITERIA_DATA.compliance.categories.forEach(cat => {
                cat.items.forEach(item => compTotal += scores[item.id] || 0);
            });

            const weightedGov = govTotal * 0.6;
            const weightedComp = compTotal * 0.4;
            const finalScore = weightedGov + weightedComp;

            // อัปเดต Summary (ตัวเลข)
            document.getElementById('gov-weighted-score').innerText = Math.round(weightedGov);
            document.getElementById('comp-weighted-score').innerText = Math.round(weightedComp);
            document.getElementById('final-score').innerText = Math.round(finalScore);

            // อัปเดต Progress Bars
            document.getElementById('gov-progress-text').innerText = Math.round(govTotal) + '%';
            document.getElementById('gov-progress-bar').style.width = Math.min(100, govTotal) + '%';
            
            document.getElementById('comp-progress-text').innerText = Math.round(compTotal) + '%';
            document.getElementById('comp-progress-bar').style.width = Math.min(100, compTotal) + '%';

            // อัปเดต Raw Score ตรงหัวข้อใหญ่
            document.getElementById('governance-raw-score').innerText = Math.round(govTotal);
            document.getElementById('compliance-raw-score').innerText = Math.round(compTotal);
        }

        // Event listener สำหรับเมื่อผู้ใช้เลื่อน Slider
        function handleScoreChange(id, value) {
            scores[id] = Number(value);
            document.getElementById(`val-${id}`).innerText = scores[id];
            calculateAndUpdate();
        }

        // เริ่มต้นการทำงานเมื่อโหลดหน้าเว็บ
        document.addEventListener('DOMContentLoaded', () => {
            // สร้าง HTML สำหรับ Governance และ Compliance
            const sectionsContainer = document.getElementById('detail-sections');
            sectionsContainer.innerHTML = generateSectionHTML(CRITERIA_DATA.governance) + generateSectionHTML(CRITERIA_DATA.compliance);

            // คำนวณคะแนนและแสดงผลครั้งแรก
            calculateAndUpdate();

            // สั่งให้ Lucide Icons ทำการ render icon
            lucide.createIcons();
        });
    </script>
</body>
</html>
