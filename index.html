<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Governance & Compliance Scorecard 2025</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toolbar">
        <button onclick="window.print()" class="export-btn">🖨 Export PDF (Ctrl+P → Save as PDF → A3)</button>
    </div>

    <div class="main-card">

        <!-- Header -->
        <div class="header-banner">
            <div>
                <h1 class="header-title">Governance &amp; Compliance Scorecard 2025</h1>
                <div class="subtitle-area">
                    🏢
                    <span style="white-space:nowrap;font-weight:700;">Business Unit:</span>
                    <input type="text" placeholder="ระบุชื่อหน่วยงาน..." class="bu-input" />
                </div>
            </div>
        </div>

        <!-- Summary -->
        <div class="summary-grid">
            <div class="stat-card stat-gov">
                <div class="stat-title">Governance (60%)</div>
                <div class="stat-score"><span id="gov-weighted-score">0</span> <span class="pts-label">pts</span></div>
                <div>
                    <div class="progress-header">
                        <span>Progress</span>
                        <span id="gov-progress-text">0%</span>
                    </div>
                    <div class="progress-track">
                        <div id="gov-progress-bar" class="progress-fill fill-gov" style="width:0%"></div>
                    </div>
                </div>
            </div>

            <div class="stat-card stat-comp">
                <div class="stat-title">Compliance (40%)</div>
                <div class="stat-score"><span id="comp-weighted-score">0</span> <span class="pts-label">pts</span></div>
                <div>
                    <div class="progress-header">
                        <span>Progress</span>
                        <span id="comp-progress-text">0%</span>
                    </div>
                    <div class="progress-track">
                        <div id="comp-progress-bar" class="progress-fill fill-comp" style="width:0%"></div>
                    </div>
                </div>
            </div>

            <div class="stat-card stat-total">
                <div class="trophy-bg">🏆</div>
                <div class="stat-title">Final Score</div>
                <div class="stat-score"><span id="final-score">0</span><span class="pts-label">%</span></div>
            </div>
        </div>

        <!-- Legend -->
        <div class="legend">
            <span><span class="dot dot-gold"></span> Gold: 90–100%</span>
            <span><span class="dot dot-silver"></span> Silver: 75–89%</span>
            <span><span class="dot dot-bronze"></span> Bronze: 60–74%</span>
        </div>

        <!-- Detail Sections -->
        <div class="details-grid" id="detail-sections"></div>

        <!-- Footer -->
        <div class="sheet-footer">
            <span>Governance &amp; Compliance Award Criteria 2025 · Confidential</span>
            <span id="gen-date"></span>
        </div>

    </div>

    <script>
    const CRITERIA_DATA = {
        governance: {
            title: "Governance", weight: 60, theme: "gov", icon: "🏛",
            categories: [
                { title: "1. Board Governance (25%)", icon: "🏛",
                  items: [
                    { id: "g1_1", title: "1.1 Attendance of Governing Body", max: 5 },
                    { id: "g1_2", title: "1.2 Circulation of Meeting Agendas", max: 5 },
                    { id: "g1_3", title: "1.3 Implementation of Resolutions", max: 10 },
                    { id: "g1_4", title: "1.4 Performance Evaluations", max: 5 },
                  ]},
                { title: "2. Governance Implementation (25%)", icon: "🎯",
                  items: [
                    { id: "g2_1", title: "2.1 Completion of CG Plan", max: 15 },
                    { id: "g2_2", title: "2.2 Anti-Corruption Recommendations", max: 10 },
                  ]},
                { title: "3. Ethical Culture (25%)", icon: "🤝",
                  items: [
                    { id: "g3_1", title: "3.1 Promoting Ethical Culture", max: 10 },
                    { id: "g3_2", title: "3.2 Employees Governance Training", max: 15 },
                  ]},
                { title: "4. Transparency & Disclosure (25%)", icon: "🔍",
                  items: [
                    { id: "g4_1", title: "4.1 CG Page on Company Website", max: 20 },
                    { id: "g4_2", title: "4.2 Governance Report to the Group", max: 5 },
                  ]},
            ]
        },
        compliance: {
            title: "Compliance", weight: 40, theme: "comp", icon: "🛡",
            categories: [
                { title: "1. Maturity Level (40%)", icon: "🛡",
                  items: [
                    { id: "c1_1", title: "1.1 Compliance Maturity Level", max: 20 },
                    { id: "c1_2", title: "1.2 Whistleblowing Maturity Level", max: 20 },
                  ]},
                { title: "2. Activities Attendance (10%)", icon: "👥",
                  items: [
                    { id: "c2_1", title: "2.1 Compliance Network Meeting", max: 5 },
                    { id: "c2_2", title: "2.2 Procedure Training", max: 5 },
                  ]},
                { title: "3. Compliance Implementation (30%)", icon: "📋",
                  items: [
                    { id: "c3_1", title: "3.1 Regulatory Compliance Universe", max: 10 },
                    { id: "c3_2", title: "3.2 Non-Compliance Incident Report", max: 5 },
                    { id: "c3_3", title: "3.3 CM Training", max: 10 },
                    { id: "c3_4", title: "3.4 Compliance Maturity Assessment", max: 5 },
                  ]},
                { title: "4. Whistleblowing Implementation (20%)", icon: "📢",
                  items: [
                    { id: "c4_1", title: "4.1 Whistleblowing Statistics Report", max: 5 },
                    { id: "c4_2", title: "4.2 Whistleblowing Maturity Assessment", max: 5 },
                    { id: "c4_3", title: "4.3 Whistleblowing Communication", max: 10 },
                  ]},
            ]
        }
    };

    let scores = {
        g1_1:4,g1_2:3,g1_3:8,g1_4:5,
        g2_1:10,g2_2:8,
        g3_1:8,g3_2:12,
        g4_1:15,g4_2:4,
        c1_1:15,c1_2:15,
        c2_1:4,c2_2:4,
        c3_1:8,c3_2:4,c3_3:8,c3_4:4,
        c4_1:4,c4_2:4,c4_3:8
    };

    function generateSectionHTML(key, sectionData) {
        let cats = '';
        sectionData.categories.forEach(cat => {
            let items = cat.items.map(item => `
                <div class="item-row">
                    <div class="item-name">${item.title}</div>
                    <input type="range" min="0" max="${item.max}" step="1"
                        value="${scores[item.id]||0}"
                        class="slider-${sectionData.theme}"
                        oninput="handleScoreChange('${item.id}', this.value)"
                    />
                    <div class="item-score-box">
                        <span id="val-${item.id}">${scores[item.id]||0}</span> / ${item.max}
                    </div>
                </div>
            `).join('');
            cats += `
                <div class="category-card">
                    <div class="category-title">${cat.icon} ${cat.title}</div>
                    <div class="item-list">${items}</div>
                </div>
            `;
        });

        return `
            <div class="section-card section-${sectionData.theme}">
                <div class="section-header">
                    <h2 class="section-title">${sectionData.icon} ${sectionData.title} (${sectionData.weight}%)</h2>
                    <div>
                        <div class="section-raw-score">
                            <span id="${key}-raw-score">0</span><span class="raw-percent">%</span>
                        </div>
                        <div class="raw-label">Raw Score</div>
                    </div>
                </div>
                <div class="categories">${cats}</div>
            </div>
        `;
    }

    function calculateAndUpdate() {
        let govTotal = 0;
        CRITERIA_DATA.governance.categories.forEach(cat =>
            cat.items.forEach(item => govTotal += scores[item.id]||0));

        let compTotal = 0;
        CRITERIA_DATA.compliance.categories.forEach(cat =>
            cat.items.forEach(item => compTotal += scores[item.id]||0));

        const weightedGov = govTotal * 0.6;
        const weightedComp = compTotal * 0.4;
        const finalScore = Math.round(weightedGov + weightedComp);

        document.getElementById('gov-weighted-score').textContent = Math.round(weightedGov);
        document.getElementById('comp-weighted-score').textContent = Math.round(weightedComp);
        document.getElementById('final-score').textContent = finalScore;
        document.getElementById('gov-progress-text').textContent = Math.round(govTotal) + '%';
        document.getElementById('gov-progress-bar').style.width = Math.min(100, govTotal) + '%';
        document.getElementById('comp-progress-text').textContent = Math.round(compTotal) + '%';
        document.getElementById('comp-progress-bar').style.width = Math.min(100, compTotal) + '%';
        document.getElementById('governance-raw-score').textContent = Math.round(govTotal);
        document.getElementById('compliance-raw-score').textContent = Math.round(compTotal);

    }

    function handleScoreChange(id, value) {
        scores[id] = Number(value);
        document.getElementById('val-' + id).textContent = scores[id];
        calculateAndUpdate();
    }

    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('detail-sections');
        container.innerHTML =
            generateSectionHTML('governance', CRITERIA_DATA.governance) +
            generateSectionHTML('compliance', CRITERIA_DATA.compliance);
        calculateAndUpdate();
        document.getElementById('gen-date').textContent =
            new Date().toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' });
    });
    </script>
</body>
</html>
